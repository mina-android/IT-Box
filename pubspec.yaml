name: inventorya
description: Inventorya - Inventory Management Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  intl: ^0.19.0
  share_plus: ^8.0.2
  file_picker: ^8.0.3
  pdf: ^3.10.8
  shared_preferences: ^2.2.3
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/icon/app_icon_mono.png
